<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password | SS Rail Works</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
background:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.box{
background:#ffffff;
padding:40px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
max-width:480px;
width:100%;
}

h1{
margin:0 0 10px;
font-size:32px;
color:#e11d48;
}

p{
color:#64748b;
margin-bottom:25px;
}

.field{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:700;
color:#111827;
}

.password-wrap{
position:relative;
}

input{
width:100%;
padding:14px 45px 14px 14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
outline:none;
box-sizing:border-box;
}

input:focus{
border-color:#e11d48;
}

.eye{
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
user-select:none;
}

button{
width:100%;
padding:14px;
border:none;
background:#e11d48;
color:#fff;
font-size:16px;
font-weight:800;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#be123c;
}

.error{
color:#dc2626;
font-size:14px;
margin-bottom:15px;
font-weight:700;
display:none;
}
</style>
</head>

<body>

<div class="box">

<h1>Reset Password</h1>
<p>{{ email }}</p>

<form method="POST" onsubmit="return validatePasswords()">

<div class="error" id="errorMsg">
Passwords do not match.
</div>

<div class="field">
<label>New Password</label>

<div class="password-wrap">
<input type="password" id="password" name="password" required>
<span class="eye" onclick="togglePassword('password', this)">👁️</span>
</div>
</div>

<div class="field">
<label>Confirm New Password</label>

<div class="password-wrap">
<input type="password" id="confirmPassword" required>
<span class="eye" onclick="togglePassword('confirmPassword', this)">👁️</span>
</div>
</div>

<button type="submit">
Update Password
</button>

</form>

</div>

<script>
function togglePassword(id, icon){

let input = document.getElementById(id);

if(input.type === "password"){
input.type = "text";
icon.innerHTML = "🙈";
}else{
input.type = "password";
icon.innerHTML = "👁️";
}

}

function validatePasswords(){

let pass1 = document.getElementById("password").value;
let pass2 = document.getElementById("confirmPassword").value;
let error = document.getElementById("errorMsg");

if(pass1 !== pass2){
error.style.display = "block";
return false;
}

return true;
}
</script>

</body>
</html>
