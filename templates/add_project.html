<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Project | SS Rail Works</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f8fafc;
color:#111827;
}

/* NAVBAR */

.navbar{
background:#ffffff;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 14px rgba(0,0,0,.06);
flex-wrap:wrap;
gap:20px;
}

/* BRAND */

.brand-link{
text-decoration:none;
}

.logo-wrap{
display:flex;
align-items:center;
gap:15px;
}

.logo-wrap img{
height:62px;
width:auto;
}

.brand-box{
display:flex;
flex-direction:column;
}

.logo-text{
font-size:38px;
font-weight:900;
color:#e11d48;
line-height:1;
letter-spacing:1px;
}

.brand-bottom{
display:flex;
align-items:center;
gap:10px;
margin-top:6px;
}

.brand-line{
width:220px;
height:3px;
background:#cbd5e1;
border-radius:20px;
}

.logo-sub{
font-size:13px;
font-weight:800;
color:#111827;
letter-spacing:1px;
}

/* LINKS */

.nav-links{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.nav-links a{
text-decoration:none;
padding:10px 18px;
border-radius:10px;
font-weight:700;
color:#111827;
background:#f1f5f9;
transition:.3s;
}

.nav-links a:hover{
background:#e11d48;
color:#fff;
}

/* MAIN */

.main{
padding:40px;
}

.container{
max-width:760px;
margin:auto;
background:#fff;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
}

h1{
font-size:36px;
color:#e11d48;
margin-bottom:10px;
}

.sub{
color:#64748b;
margin-bottom:30px;
line-height:1.7;
}

/* FORM */

.field{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:800;
font-size:14px;
color:#111827;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:12px;
font-size:15px;
outline:none;
transition:.2s;
background:#fff;
}

input:focus,
select:focus,
textarea:focus{
border-color:#e11d48;
box-shadow:0 0 0 3px rgba(225,29,72,.08);
}

textarea{
min-height:140px;
resize:vertical;
}

/* BUTTONS */

.btn-row{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:10px;
}

.btn{
border:none;
padding:14px 24px;
color:#fff;
font-weight:800;
border-radius:10px;
cursor:pointer;
text-decoration:none;
transition:.3s;
}

.save-btn{
background:#e11d48;
}

.save-btn:hover{
background:#be123c;
}

.cancel-btn{
background:#64748b;
}

.cancel-btn:hover{
background:#475569;
}

/* MOBILE */

@media(max-width:768px){

.navbar{
padding:18px 20px;
}

.main{
padding:22px;
}

.container{
padding:24px;
}

h1{
font-size:28px;
}

.logo-wrap img{
height:48px;
}

.logo-text{
font-size:24px;
}

.brand-line{
width:120px;
height:2px;
}

.logo-sub{
font-size:10px;
}

}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<a href="/dashboard" class="brand-link">

<div class="logo-wrap">

<img src="{{ url_for('static', filename='logo.png') }}">

<div class="brand-box">

<div class="logo-text">SS RAIL WORKS</div>

<div class="brand-bottom">
<div class="brand-line"></div>
<div class="logo-sub">PVT. LTD.</div>
</div>

</div>

</div>

</a>

<div class="nav-links">
<a href="/dashboard">Dashboard</a>
<a href="/projects">Projects</a>
<a href="/logout">Logout</a>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="container">

<h1>Add New Project</h1>

<div class="sub">
Create a railway project and store it securely in the management database.
</div>

<form method="POST">

<div class="field">
<label>Project Name</label>
<input type="text" name="name" placeholder="Enter project name" required>
</div>

<div class="field">
<label>Department</label>
<input type="text" name="department" placeholder="Enter department" required>
</div>

<div class="field">
<label>Status</label>
<select name="status" required>
<option value="">Select status</option>
<option value="Planning">Planning</option>
<option value="In Progress">In Progress</option>
<option value="Completed">Completed</option>
<option value="Delayed">Delayed</option>
</select>
</div>

<div class="field">
<label>Progress (%)</label>
<input type="number" name="progress" min="0" max="100" placeholder="0 to 100" required>
</div>

<div class="field">
<label>Description</label>
<textarea name="description" placeholder="Write project details..."></textarea>
</div>

<div class="btn-row">
<button type="submit" class="btn save-btn">Save Project</button>
<a href="/projects" class="btn cancel-btn">Cancel</a>
</div>

</form>

</div>

</div>

</body>
</html>
